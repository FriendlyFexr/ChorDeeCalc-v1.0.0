<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3p Chor Dai Dee Scorecard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: linear-gradient(135deg, #166534 10%, #facc15 90%); min-height: 100vh; }
        [x-cloak] { display: none !important; }
        .no-spinner::-webkit-inner-spin-button, .no-spinner::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .input-card { width: 50px; }
    </style>
</head>
<body class="p-2 sm:p-4 font-sans" x-data="gameHandler()">

    <div class="max-w-6xl mx-auto bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-4 sm:p-6">
        
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-3xl font-black text-indigo-700 tracking-tighter uppercase italic">
                <span x-text="t('title')"></span>
            </h1>
            <button @click="toggleLang()" 
                    class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold shadow-md hover:bg-indigo-700 transition-all active:scale-95">
                <span x-text="lang === 'en' ? '中文' : 'English'"></span>
            </button>
        </div>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 border-b border-indigo-100 pb-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-indigo-50">
                <h2 class="font-bold mb-3 text-indigo-800 text-sm flex items-center gap-2">
                    <span class="bg-indigo-100 px-2 py-0.5 rounded">1</span> 
                    <span x-text="t('setup')"></span>
                </h2>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <template x-for="(name, index) in settings.players" :key="index">
                        <input type="text" x-model="settings.players[index]" class="border p-2 rounded text-xs focus:ring-2 focus:ring-indigo-400 outline-none bg-gray-50">
                    </template>
                </div>
                <div class="flex items-center gap-3">
                    <label class="text-xs font-bold text-gray-600" x-text="t('base')"></label>
                    <input type="number" x-model.number="settings.baseAmount" class="border p-1 w-16 rounded text-center font-bold no-spinner bg-indigo-50 border-indigo-200">
                    <label class="flex items-center text-[10px] text-gray-500 cursor-pointer">
                        <input type="checkbox" x-model="settings.includeBaseInMult" class="mr-1"> <span x-text="t('incBase')"></span>
                    </label>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-indigo-50">
                <h2 class="font-bold mb-3 text-indigo-800 text-sm flex items-center gap-2">
                    <span class="bg-indigo-100 px-2 py-0.5 rounded">2</span> 
                    <span x-text="t('rules')"></span>
                </h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <div class="flex items-center gap-2 text-xs">
                            <label x-text="t('weight')"></label>
                            <select x-model.number="settings.weight" @change="calculateAll()" class="border font-bold p-1 rounded bg-gray-50">
                                <option value="0.5">0.5</option><option value="1">1</option><option value="2">2</option><option value="5">5</option>
                            </select>
                        </div>
                        <div class="flex gap-2 text-[10px] text-gray-500">
                            <label class="flex items-center"><input type="checkbox" x-model="settings.allowRoundUp" @change="calculateAll()" class="mr-1"> <span x-text="t('roundUp')"></span></label>
                            <label class="flex items-center"><input type="checkbox" x-model="settings.winnerTakeAllOnly" @change="calculateAll()" class="mr-1"> <span x-text="t('winnerOnly')"></span></label>
                        </div>
                    </div>
                    <div class="bg-amber-50 p-2 rounded border border-amber-100">
                        <p class="text-[9px] font-bold text-amber-700 mb-1" x-text="t('threshold')"></p>
                        <div class="flex gap-2">
                            <div class="text-center">
                                <p class="text-[8px]">x2</p>
                                <input type="number" x-model.number="settings.x2" @input="calculateAll()" class="w-7 text-center text-xs border border-amber-200 rounded no-spinner">
                            </div>
                            <div class="text-center">
                                <p class="text-[8px]">x3</p>
                                <input type="number" x-model.number="settings.x3" @input="calculateAll()" class="w-7 text-center text-xs border border-amber-200 rounded no-spinner">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="table-container overflow-auto max-h-[500px] rounded-xl border border-gray-200 shadow-inner bg-white">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead class="sticky top-0 z-10">
                    <tr class="bg-indigo-700 text-white text-[11px] uppercase tracking-wider">
                        <th class="p-2 border border-indigo-800 text-center" x-text="t('game')"></th>
                        <template x-for="name in settings.players">
                            <th class="p-2 border border-indigo-800 text-center" x-text="name"></th>
                        </template>
                        <template x-for="name in settings.players">
                            <th class="p-2 border border-indigo-800 text-center bg-indigo-800" x-text="name"></th>
                        </template>
                        <th class="p-2 border border-indigo-800 text-center" x-text="t('special')"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="sticky top-[34px] z-10 bg-yellow-300 font-black text-sm border-b-2 border-yellow-400">
                        <td class="p-2 text-center text-yellow-800">Σ</td>
                        <td colspan="3" class="text-center italic text-xs text-yellow-900" x-text="t('liveScore')"></td>
                        <template x-for="total in totals">
                            <td class="p-2 text-center" :class="total < 0 ? 'text-red-700' : 'text-green-800'" x-text="total.toFixed(1)"></td>
                        </template>
                        <td class="p-2 text-center text-[10px] uppercase" x-text="t('total')"></td>
                    </tr>

                    <template x-for="(row, rIndex) in rows" :key="rIndex">
                        <tr class="hover:bg-indigo-50/50 transition-colors border-b border-gray-100">
                            <td class="p-2 text-center font-mono text-xs">
                                <span class="font-bold text-indigo-400" x-text="rIndex + 1"></span>
                                <div class="text-[8px] text-gray-400" x-text="row.time"></div>
                            </td>
                            <template x-for="pIdx in [0,1,2]">
                                <td class="p-1 border-x border-gray-50 text-center">
                                    <input type="number" min="0" max="13" x-model.number="row.cards[pIdx]" @input="calculateRow(rIndex)"
                                           class="input-card border rounded p-1 text-center font-bold text-sm focus:bg-white outline-none"
                                           :class="row.cards[pIdx] >= settings.x3 ? 'bg-red-600 text-white' : (row.cards[pIdx] >= settings.x2 ? 'bg-orange-100 text-orange-700' : 'bg-gray-50')">
                                </td>
                            </template>
                            <template x-for="pIdx in [0,1,2]">
                                <td class="p-1 border-x border-gray-50 text-center font-bold text-sm"
                                    :class="row.results[pIdx] < 0 ? 'text-red-500' : (row.results[pIdx] > 0 ? 'text-green-600' : 'text-gray-300')"
                                    x-text="row.results[pIdx].toFixed(1)"></td>
                            </template>
                            <td class="p-1 text-center">
                                <div class="flex flex-col gap-1">
                                    <label class="text-[9px] bg-blue-50 text-blue-700 px-1 py-0.5 rounded cursor-pointer flex items-center justify-center">
                                        <input type="checkbox" x-model="row.isDouble" @change="calculateRow(rIndex)" class="mr-1 scale-75"> ♦️3 拉尾
                                    </label>
                                    <button @click="row.showSpecial = !row.showSpecial" 
                                            class="text-[9px] px-1 py-0.5 rounded border border-dashed transition"
                                            :class="row.showSpecial ? 'bg-indigo-600 text-white border-transparent' : 'bg-white text-indigo-600 border-indigo-200'">
                                        Bonus
                                    </button>
                                    <div x-show="row.showSpecial" class="flex gap-1 justify-center mt-1" x-cloak>
                                        <template x-for="pIdx in [0,1,2]">
                                            <input type="number" x-model.number="row.special[pIdx]" @input="calculateRow(rIndex)" class="w-8 text-[9px] border border-indigo-200 rounded text-center no-spinner">
                                        </template>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="mt-8 flex flex-wrap justify-center gap-3">
            <button @click="addRows()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition-all shadow-lg">+5 Rows</button>
            <button @click="showSummary = true" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition-all shadow-lg" x-text="t('summary')"></button>
            <button @click="captureTable()" class="bg-sky-500 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition-all shadow-lg" x-text="t('screenshot')"></button>
            <button @click="resetGame()" class="bg-rose-600 text-white px-6 py-3 rounded-xl font-bold hover:scale-105 transition-all shadow-lg" x-text="t('reset')"></button>
        </div>

        <div x-show="sumWarning" x-cloak class="fixed bottom-10 right-10 bg-red-600 text-white p-4 rounded-2xl shadow-2xl animate-bounce font-bold z-50">
            ⚠️ Bonus Checksum Error!
        </div>

        <div x-show="showSummary" x-cloak class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border-t-8 border-indigo-600">
                <h2 class="text-2xl font-black text-center mb-6 text-gray-800" x-text="t('rankings')"></h2>
                <div class="space-y-4">
                    <template x-for="(rank, i) in summaryRanks.amount">
                        <div class="flex justify-between items-center p-3 rounded-2xl border border-gray-100" :class="i===0 ? 'bg-indigo-50 border-indigo-200' : 'bg-gray-50'">
                            <span class="font-bold text-gray-700" x-text="(i+1) + '. ' + rank.name"></span>
                            <span class="font-black" :class="rank.val < 0 ? 'text-red-500' : 'text-green-600'" x-text="rank.val.toFixed(1)"></span>
                        </div>
                    </template>
                </div>
                <button @click="showSummary = false" class="w-full mt-8 bg-gray-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition-colors" x-text="t('back')"></button>
            </div>
        </div>
    </div>

    <script>
        function gameHandler() {
            return {
                lang: 'en',
                dictionary: {
                    en: {
                        title: "3P Chor Dai Dee",
                        setup: "Players & Base",
                        base: "Base Amount:",
                        incBase: "Include Base in Multiplier",
                        rules: "Rules & Thresholds",
                        weight: "Weight/Card:",
                        roundUp: "Round Up",
                        winnerOnly: "Winner Take All",
                        threshold: "Multipliers (x2, x3)",
                        game: "Rd",
                        special: "Special",
                        liveScore: "♠️2 GLHF! Current Standings",
                        total: "Total Score",
                        summary: "Leaderboard",
                        screenshot: "Save Image",
                        reset: "Reset All",
                        rankings: "Final Rankings",
                        back: "Back to Game"
                    },
                    zh: {
                        title: "3人锄大D记分板",
                        setup: "玩家与底注",
                        base: "【底注】金额:",
                        incBase: "底注也乘倍率",
                        rules: "计算规则",
                        weight: "每张分数:",
                        roundUp: "向上取整",
                        winnerOnly: "只计赢家",
                        threshold: "炒牌门槛 (x2, x3)",
                        game: "局",
                        special: "动作",
                        liveScore: "♠️2 祝好运！目前总分",
                        total: "累计总分",
                        summary: "排行榜",
                        screenshot: "保存图片",
                        reset: "全部清空",
                        rankings: "本场战绩",
                        back: "返回"
                    }
                },
                t(key) { return this.dictionary[this.lang][key]; },
                toggleLang() { this.lang = (this.lang === 'en' ? 'zh' : 'en'); },

                settings: {
                    players: ['Player 1', 'Player 2', 'Player 3'],
                    baseAmount: 2,
                    includeBaseInMult: false,
                    weight: 1,
                    allowRoundUp: true,
                    winnerTakeAllOnly: false,
                    x2: 10, x3: 13
                },
                rows: [],
                totals: [0, 0, 0],
                sumWarning: false,
                showSummary: false,

                init() {
                    const saved = localStorage.getItem('3paxChorDee_v2');
                    if (saved) {
                        const data = JSON.parse(saved);
                        this.settings = data.settings;
                        this.rows = data.rows;
                    } else {
                        for (let i = 0; i < 8; i++) this.createRow();
                    }
                    this.calculateAll();
                },

                createRow() {
                    this.rows.push({
                        time: '',
                        cards: [null, null, null],
                        results: [0, 0, 0],
                        special: [0, 0, 0],
                        showSpecial: false,
                        isDouble: false
                    });
                },

                calculateRow(index) {
                    let row = this.rows[index];
                    let r = [0, 0, 0];
                    let c = row.cards.map(v => parseInt(v) || 0);
                    let winnerIdx = c.indexOf(0);
                    let active = winnerIdx !== -1 && c.some(v => v > 0);

                    if (active && !row.time) {
                        row.time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    if (active) {
                        let winnerGains = 0;
                        c.forEach((count, i) => {
                            if (i === winnerIdx) return;
                            let mult = count >= this.settings.x3 ? 3 : (count >= this.settings.x2 ? 2 : 1);
                            let amt = this.settings.includeBaseInMult 
                                ? ((count * this.settings.weight) + this.settings.baseAmount) * mult
                                : (count * this.settings.weight * mult) + this.settings.baseAmount;
                            
                            if (row.isDouble) amt *= 2;
                            if (this.settings.allowRoundUp) amt = Math.ceil(amt);
                            
                            r[i] -= amt;
                            winnerGains += amt;
                        });
                        r[winnerIdx] = winnerGains;

                        // Optional: Side Bets logic can be re-added here if needed
                    }

                    // Add Bonus inputs
                    row.special.forEach((val, i) => { r[i] += (parseFloat(val) || 0); });
                    row.results = r;
                    this.calculateTotals();
                    this.save();
                },

                calculateTotals() {
                    let nt = [0, 0, 0];
                    let checkSum = 0;
                    this.rows.forEach(row => {
                        row.results.forEach((v, i) => { nt[i] += v; checkSum += v; });
                    });
                    this.totals = nt;
                    this.sumWarning = Math.abs(checkSum) > 0.05;
                },

                calculateAll() { this.rows.forEach((_, i) => this.calculateRow(i)); },
                addRows() { for (let i = 0; i < 5; i++) this.createRow(); this.save(); },
                save() { localStorage.setItem('3paxChorDee_v2', JSON.stringify({ settings: this.settings, rows: this.rows })); },
                resetGame() { if (confirm("Clear all data?")) { localStorage.removeItem('3paxChorDee_v2'); location.reload(); } },

                get summaryRanks() {
                    let amt = this.settings.players.map((n, i) => ({ name: n, val: this.totals[i] }));
                    return { amount: amt.sort((a,b) => b.val - a.val) };
                },

                async captureTable() {
                    const el = document.querySelector('.table-container');
                    const canvas = await html2canvas(el, { scale: 2 });
                    const link = document.createElement('a');
                    link.download = `ChorDaiDee_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
